---
name: Build container images

permissions:
  packages: write

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    paths:
      - .github/workflows/build-container-images.yml
      - images/**
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/build-container-images.yml
      - images/**

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - image: kubectl
            version: v1.36.1  # renovate: datasource=github-releases depName=kubernetes/kubernetes
          - image: helm
            version: v3.21.0  # renovate: datasource=github-releases depName=helm/helm
          - image: clusterctl
            version: v1.13.2  # renovate: datasource=github-releases depName=kubernetes-sigs/cluster-api
          - image: kind
            version: v0.31.0  # renovate: datasource=github-releases depName=kubernetes-sigs/kind
          - image: k9s
            version: v0.50.18  # renovate: datasource=github-releases depName=derailed/k9s
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Login to container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: github.repository == 'YAKEcloud/yake-ansible' && github.ref == 'refs/heads/main'

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          push: ${{ github.repository == 'YAKEcloud/yake-ansible' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/yakecloud/${{ matrix.image }}:${{ matrix.version }}
          build-args: |
            VERSION=${{ matrix.version }}
