---
- name: Deploy cilium
  kubernetes.core.helm:
    binary_path: "{{ playbook_dir }}/.local/yake-helm"
    release_name: cilium
    chart_ref: oci://quay.io/cilium/charts/cilium
    chart_version: "{{ clusterapi_cluster_cilium_version }}"
    release_namespace: kube-system
    create_namespace: true
    kubeconfig: "/var/lib/yake/kubeconfig.{{ clusterapi_cluster_name }}"
    wait: true
    values: "{{ clusterapi_cluster_cilium_helm_values }}"
  environment: "{{ clusterapi_cluster_proxy_env }}"

- name: Wait for cilium pods
  kubernetes.core.k8s_info:
    kubeconfig: "/var/lib/yake/kubeconfig.{{ clusterapi_cluster_name }}"
    kind: Pod
    namespace: kube-system
  register: cilium_pods  # noqa: var-naming[no-role-prefix]
  until: >
    cilium_pods.resources is defined and
    (
      cilium_pods.resources
      | selectattr('metadata.labels', 'defined')
      | selectattr('metadata.labels.k8s-app', 'defined')
      | selectattr('metadata.labels.k8s-app', 'equalto', 'cilium')
      | selectattr('status.phase', 'equalto', 'Running')
      | list | length ==
      cilium_pods.resources
      | selectattr('metadata.labels', 'defined')
      | selectattr('metadata.labels.k8s-app', 'defined')
      | selectattr('metadata.labels.k8s-app', 'equalto', 'cilium')
      | list | length
    )
  retries: 30
  delay: 10
