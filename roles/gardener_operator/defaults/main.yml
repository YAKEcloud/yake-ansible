---
gardener_operator_uid: "{{ ansible_facts.user_uid | string }}"
gardener_operator_gid: "{{ ansible_facts.user_gid | string }}"

gardener_operator_clusterapi_name: garden
gardener_operator_proxy_env: "{{ proxy_env | d({}) }}"
gardener_operator_proxy_host: ""
gardener_operator_proxy_port: 3128

# renovate: datasource=github-releases depName=gardener/gardener
gardener_operator_version: '1.146.4'
# renovate: datasource=helm registryUrl=https://kyverno.github.io/kyverno/ depName=kyverno
gardener_operator_kyverno_version: '3.8.1'
gardener_operator_helm_values: {}

# renovate: datasource=github-releases depName=dexidp/helm-charts extractVersion=^dex-(?<version>.+)$
gardener_operator_dex_version: '0.24.1'
gardener_operator_dex:
  dashboard_secret: ""
  static_passwords: []
  # - email: "admin@example.com"
  #   # bcrypt hash of the string "password": $(printf 'password' | htpasswd -BinC 10 admin | cut -d: -f2)
  #   hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
  #   username: "admin"
  connectors: []
  # https://dexidp.io/docs/connectors/
  # - type: oidc
  #   id: keycloak
  #   name: Keycloak
  #   config:
  #     issuer: https://keycloak.example.com/realms/myrealm
  #     clientID: dex
  #     clientSecret: dex-secret
  #     redirectURI: https://identity.example.com/callback

gardener_operator_openstack_auth_url: "https://keystone.example.com"
gardener_operator_openstack_project_name: example
gardener_operator_openstack_domain_name: example
gardener_operator_openstack_region_name: RegionOne
gardener_operator_openstack_application_credential_id: ""
gardener_operator_openstack_application_credential_name: example-creds
gardener_operator_openstack_application_credential_secret: ""
gardener_operator_openstack_zones:
  - zone1
gardener_operator_openstack_cacert: ""

gardener_operator_garden_url: example.com
gardener_operator_cluster_name: prod-garden
# renovate: datasource=github-releases depName=kubernetes/kubernetes
gardener_operator_kubernetes_version: '1.36.2'
gardener_operator_image_registry: "europe-docker.pkg.dev"

# Optional: Override the gardenlet image vector, e.g. to pull images from a private registry.
# The value is injected verbatim into Gardenlet.spec.deployment.helm.imageVectorOverwrite.
# Jinja2 expressions are resolved, so you can reference other variables here.
gardener_operator_gardenlet_image_vector_overwrite: ""
# gardener_operator_gardenlet_image_vector_overwrite: |
#   images:
#   - name: gardener-node-agent
#     repository: "{{ gardener_operator_image_registry }}/gardener-project/releases/gardener/node-agent"
#     tag: "v{{ gardener_operator_version }}"

# Feature gates for all gardenlets (internal seed and managed seeds).
gardener_operator_gardenlet_feature_gates: {}

# Collect all shoot Prometheus metrics from every seed (internal seed and managed seeds) via remote write.
# https://gardener.cloud/docs/gardener/monitoring/#collect-all-shoot-prometheus-with-remote-write
# Enabled when remote_write.url is non-empty.
gardener_operator_monitoring:
  remote_write:
    url: ""
    # Metric names to forward; leave empty to forward all metrics.
    keep: []
  # Basic auth credentials for the remote write endpoint; leave both empty to disable basic auth.
  basic_auth:
    username: ""
    password: ""

# renovate: datasource=github-releases depName=gardener/gardener-extension-provider-openstack
gardener_operator_provider_openstack_version: '1.57.0'
gardener_operator_provider_openstack_storageclass_name: default
# gardener_operator_provider_openstack_storageclass_type: default
gardener_operator_provider_openstack_storageclass_zone: nova
# Raw values merged into the provider-openstack extension's Helm chart, e.g. to override
# the etcd storage class it provisions for shoot control planes (config.etcd.storage).
# https://github.com/gardener/gardener-extension-provider-openstack/blob/master/charts/gardener-extension-provider-openstack/values.yaml
gardener_operator_provider_openstack_helm_values: {}

# DNS Provider (independent of infrastructure provider)
# Supported types: openstack-designate, aws-route53, azure-dns, google-clouddns
# The corresponding provider extension is deployed automatically based on this value.
gardener_operator_dns_provider_type: "openstack-designate"
# DNS provider credentials as plain-text key-value pairs (will be base64-encoded in Kubernetes Secrets).
# Leave empty ({}) to reuse the OpenStack credentials above. Only valid for openstack-designate.
# Example for aws-route53:
#   AWS_ACCESS_KEY_ID: "AKIAIOSFODNN7EXAMPLE"
#   AWS_SECRET_ACCESS_KEY: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
#   region: "eu-central-1"
# Example for azure-dns:
#   subscriptionID: "..."
#   tenantID: "..."
#   clientID: "..."
#   clientSecret: "..."
# Example for google-clouddns:
#   serviceaccount.json: |
#     { "type": "service_account", ... }
gardener_operator_dns_credentials: {}

# renovate: datasource=github-releases depName=gardener/gardener-extension-provider-aws
gardener_operator_provider_aws_version: '1.72.0'
# renovate: datasource=github-releases depName=gardener/gardener-extension-provider-azure
gardener_operator_provider_azure_version: '1.62.1'
# renovate: datasource=github-releases depName=gardener/gardener-extension-provider-gcp
gardener_operator_provider_gcp_version: '1.53.4'

# renovate: datasource=github-releases depName=gardener/gardener-extension-shoot-cert-service
gardener_operator_shoot_cert_service_version: '1.62.1'
gardener_operator_shoot_cert_service_issuer_type: acme  # acme or ca
gardener_operator_shoot_cert_service_ca_certificate: ""
gardener_operator_shoot_cert_service_ca_key: ""
gardener_operator_shoot_cert_service_acme_email: ""
# Staging: https://acme-staging-v02.api.letsencrypt.org/directory
gardener_operator_shoot_cert_service_acme_server: "https://acme-v02.api.letsencrypt.org/directory"
gardener_operator_shoot_cert_service_ca_certificates: ""
gardener_operator_shoot_cert_service_precheck_nameservers: "1.1.1.1,1.0.0.1"

# renovate: datasource=github-releases depName=gardener/gardener-extension-shoot-dns-service
gardener_operator_shoot_dns_service_version: '1.88.0'

# Networking extension: exactly one of 'cilium' or 'calico'.
gardener_operator_networking_type: cilium
# renovate: datasource=github-releases depName=gardener/gardener-extension-networking-cilium
gardener_operator_networking_cilium_version: '1.48.4'
# renovate: datasource=github-releases depName=gardener/gardener-extension-networking-calico
gardener_operator_networking_calico_version: '1.59.0'

# OS extensions to install. Add 'ubuntu' to also support ubuntu-based shoot workers.
gardener_operator_os_types:
  - gardenlinux
# renovate: datasource=github-releases depName=gardener/gardener-extension-os-gardenlinux
gardener_operator_os_gardenlinux_version: '0.44.0'
# renovate: datasource=github-releases depName=gardener/gardener-extension-os-ubuntu
gardener_operator_os_ubuntu_version: '1.40.1'

# Registry cache/mirror extension is deployed automatically when either variable below is non-empty.
# renovate: datasource=github-releases depName=gardener/gardener-extension-registry-cache
gardener_operator_extension_registry_cache_version: '0.23.1'

gardener_operator_managed_seeds_registry_caches: []
# - upstream: docker.io
#   volume_size: 10Gi
# - upstream: ghcr.io
# - upstream: registry.k8s.io
# - upstream: europe-docker.pkg.dev

gardener_operator_shoot_oidc_service_enabled: false
# renovate: datasource=github-releases depName=gardener/gardener-extension-shoot-oidc-service
gardener_operator_shoot_oidc_service_version: '0.40.0'

# S3 backup extension is deployed automatically when any backup provider is set to 'S3'.
# renovate: datasource=github-releases depName=metal-stack/gardener-extension-backup-s3
gardener_operator_backup_s3_version: '0.8.3'

# Garden etcd backup — enabled when credentials are non-empty.
gardener_operator_garden_backup_provider: openstack
gardener_operator_garden_backup_region: "{{ gardener_operator_openstack_region_name }}"
gardener_operator_garden_backup_bucket_name: gardener-operator
# Look up your credentials scheme for your provider
gardener_operator_garden_backup_credentials: ""

# Internal seed backup — enabled when credentials are non-empty.
gardener_operator_internal_seed_backup_provider: openstack
gardener_operator_internal_seed_backup_region: "{{ gardener_operator_openstack_region_name }}"
gardener_operator_internal_seed_backup_bucket_name: gardener-internal-seed
# Look up your credentials scheme for your provider
gardener_operator_internal_seed_backup_credentials: ""
# Activate this only on hosts with more than 16Gi of RAM.
gardener_operator_internal_seed_excess_capacity_reservation: "false"

gardener_operator_garden_cluster_admin_email: admin@example.com

gardener_operator_cloudprofiles:
  - name: openstack-a
    storageclasses:
      - name: ssd
        default: "true"
        type: ssd
        availability: nova
    floating_pools:
      - name: public
    loadbalancer_providers:
      - name: amphora
    keystone_urls:
      - region: region-a
        url: "https://openstack.a.example.com:5000"
    machine_images:
      - name: gardenlinux
        versions:
          - version: 2150.0.0
            image: "Garden Linux 2150.0"
            regions:
              - name: region-a
                id: 6ed7d8aa-e770-4061-a8d7-461a83e41c31
    kubernetes_versions:
      - version: 1.35.3
        classification: supported
    machinetypes:
      - name: SCS-4V-8
        cpu: "4"
        gpu: "0"
        memory: 8Gi
      - name: SCS-4V-16
        cpu: "4"
        gpu: "0"
        memory: 16Gi
      - name: SCS-8V-16
        cpu: "8"
        gpu: "0"
        memory: 16Gi
    regions:
      - name: region-a
        zones:
          - nova

# CIDRs blocked in all shoot clusters via NetworkPolicy (e.g. cloud metadata service).
gardener_operator_seed_block_cidrs:
  - 169.254.169.254/32

gardener_operator_managed_seeds_project_name: seeds

gardener_operator_managed_seeds_registry_mirrors_ca: ""
gardener_operator_managed_seeds_registry_mirrors: []
  # - upstream: docker.io
  #   host: "https://harbor.example.com/docker.io"
  #   ca: true
  # - upstream: europe-docker.pkg.dev
  #   host: "https://harbor.example.com/europe-docker.pkg.dev"
  # - upstream: ghcr.io
  #   host: "https://harbor.example.com/ghcr.io"
  # - upstream: registry.k8s.io
  #   host: "https://harbor.example.com/registry.k8s.io"
  # - upstream: quay.io
  #   host: "https://harbor.example.com/quay.io"
  # - upstream: gcr.io
  #   host: "https://harbor.example.com/gcr.io"

gardener_operator_managed_seeds:
  - name: seed-a
    cloudprofile_name: openstack-a
    networking_type: cilium
    kubernetes_version: 1.35.3
    floating_pool_name: "public"
    # if not set, default is internal.{{ gardener_operator_garden_url }}
    # internal_domain: foo.example.com
    # Optional: load balancer provider (default: amphora); alternatives: haproxy, ovn
    # loadbalancer_provider: amphora
    # Optional: use an explicit worker CIDR (default: 100.96.0.0/16)
    # workers_cidr: "100.96.0.0/16"
    # Optional: use a subnet pool instead of an explicit CIDR (mutually exclusive with workers_cidr)
    # subnet_pool:
    #   id: "subnet-pool-uuid"
    #   prefix_length: 24
    openstack:
      auth_url: "https://openstack.a.example.com:5000"
      project_name: "project-a"
      domain_name: "domain-a"
      region_name: "region-a"
      application_credential_id: "cred-id-a"
      application_credential_name: "cred-name-a"
      application_credential_secret: "secret-a"
    workers:
      - name: worker-4v16
        machinetype: SCS-4V-16
        image_name: gardenlinux
        image_version: 2150.0.0
        minimum: 3
        maximum: 15
        volume_type: ssd
        volume_size: 50Gi
        zones:
          - nova
    settings:
      # Seed backup — enabled when backup.bucket_name is set.
      # backup:
      #   provider: openstack
      #   region: region-a
      #   bucket_name: bucket-a
      #   credentials:  # provider-specific key/value pairs
      #   # authURL: "https://openstack.a.example.com:5000"
      #   # tenantName: "project-a"
      #   # domainName: "domain-a"
      #   # regionName: "region-a"
      #   # applicationCredentialID: "cred-id-a"
      #   # applicationCredentialName: "cred-name-a"
      #   # applicationCredentialSecret: "secret-a"
      #   # s3ForcePathStyle: true
      excess_capacity_reservation: true
