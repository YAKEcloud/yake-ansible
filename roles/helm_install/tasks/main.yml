---
- name: Create directories
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ helm_install_uid }}"
    group: "{{ helm_install_gid }}"
    mode: 0755
    state: directory
  loop:
    - /var/lib/yake
    - "{{ playbook_dir }}/.local"

- name: Run helm container
  become: "{{ helm_install_become }}"
  community.docker.docker_container:
    name: helm
    command: sleep infinity
    image: "{{ helm_install_container_registry }}/{{ helm_install_container_image }}:{{ helm_install_version }}"
    env: "{{ {'USER_ID': helm_install_uid, 'GROUP_ID': helm_install_gid} | combine(helm_install_proxy_env) }}"
    volumes:
      - /var/lib/yake:/var/lib/yake
      - /tmp:/tmp
    restart_policy: unless-stopped
    state: started
  when: helm_install_method == "docker"

- name: Copy helm script
  become: true
  ansible.builtin.copy:
    src: helm
    dest: "{{ playbook_dir }}/.local/yake-helm"
    mode: 0755
    owner: root
    group: root
  when: helm_install_method == "docker"

- name: Download helm archive
  ansible.builtin.unarchive:
    src: "https://get.helm.sh/helm-{{ helm_install_version }}-linux-amd64.tar.gz"
    dest: "{{ playbook_dir }}/.local/"
    remote_src: true
    extra_opts:
      - "--strip-components=1"
      - "--wildcards"
      - "*/helm"
  environment: "{{ helm_install_proxy_env }}"
  when: helm_install_method == "binary"

- name: Rename helm binary
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/.local/helm"
    dest: "{{ playbook_dir }}/.local/yake-helm"
    mode: "0755"
    remote_src: true
  when: helm_install_method == "binary"

- name: Remove extracted helm
  ansible.builtin.file:
    path: "{{ playbook_dir }}/.local/helm"
    state: absent
  when: helm_install_method == "binary"
